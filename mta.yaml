_schema-version: "3.2"
ID: workflownew
version: 0.0.1
modules:
- name: workflownew-destination-content
  type: com.sap.application.content
  requires:
  - name: workflownew-destination-service
    parameters:
      content-target: true
  - name: workflownew_html_repo_host
    parameters:
      service-key:
        name: workflownew_html_repo_host-key
  - name: uaa_workflownew
    parameters:
      service-key:
        name: uaa_workflownew-key
  parameters:
    content:
      subaccount:
        destinations:
        - Name: workflownew_workflownew_html_repo_host
          ServiceInstanceName: workflownew-html5-app-host-service
          ServiceKeyName: workflownew_html_repo_host-key
          sap.cloud.service: workflownew
        - Authentication: OAuth2UserTokenExchange
          Name: workflownew_uaa_workflownew
          ServiceInstanceName: workflownew-xsuaa-service
          ServiceKeyName: uaa_workflownew-key
          sap.cloud.service: workflownew
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: workflownew-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: workflownew_html_repo_host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - workflownewworkflowuimodule.zip
      name: workflownewworkflowuimodule
      target-path: resources/
- name: workflownewworkflowuimodule
  type: html5
  path: workflow-ui-module
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: workflownew-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        subaccount:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: workflownew-destination-service
    service-plan: lite
- name: workflownew_html_repo_host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: workflownew-html5-app-host-service
    service-plan: app-host
- name: uaa_workflownew
  type: org.cloudfoundry.managed-service
  parameters:
    path: ./xs-security.json
    service: xsuaa
    service-name: workflownew-xsuaa-service
    service-plan: application
parameters:
  deploy_mode: html5-repo
